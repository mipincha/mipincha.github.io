<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Mi Pincha</title>
    <link rel="icon" type="image/png" href="images/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>tailwind.config = { theme: { extend: { colors: { pincha: { orange: '#FF6B35', blue: '#1E3A5F' } } } } }</script>
    <style>.btn-tactile:active { transform: scale(0.97); }.btn-tactile { transition: all 0.15s ease; }</style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
    <header class="bg-white shadow-sm py-4"><div class="container mx-auto px-6 flex justify-between items-center"><a href="index.html" class="flex items-center gap-2"><img src="images/logo.png" alt="Mi Pincha" class="h-8 w-auto object-contain" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'"><div class="hidden items-center gap-1"><span class="text-2xl font-bold text-pincha-blue">M</span><span class="text-2xl font-bold text-pincha-orange">P</span></div></a><a href="index.html" class="text-sm text-pincha-blue hover:text-pincha-orange font-medium">Volver al inicio</a></div></header>
    <main class="flex-grow flex items-center justify-center py-10 px-4">
        <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8">
            <h2 class="text-2xl font-bold text-center text-pincha-blue mb-6">Iniciar sesión</h2>
            <form id="loginForm" class="space-y-4">
                <div><label class="block text-sm font-medium text-gray-700 mb-1">Correo electrónico</label><input type="email" id="loginEmail" required class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-pincha-orange outline-none btn-tactile"></div>
                <div><label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label><input type="password" id="loginPass" required class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-pincha-orange outline-none btn-tactile"></div>
                <button type="submit" class="w-full bg-pincha-blue text-white font-bold py-3 rounded-lg hover:bg-blue-800 btn-tactile shadow-md">Entrar</button>
            </form>
            <div id="loginMsg" class="mt-4 text-center text-sm hidden font-bold"></div>
            <p class="text-center text-sm text-gray-500 mt-6">¿No tienes cuenta? <a href="register.html" class="text-pincha-orange font-bold hover:underline">Regístrate gratis</a></p>
        </div>
    </main>
    <script>
        const SUPABASE_URL = 'https://yznkrbhfsrcoskyoyfxs.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl6bmtyYmhmc3Jjb3NreW95ZnhzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2NjczNzQsImV4cCI6MjA5NTI0MzM3NH0.TF_iauRfdaICpT7KipXwrphQYyGu4X4v2_FzQOIl1qw';
        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button'); btn.disabled = true; btn.textContent = 'Entrando...';
            const { error } = await sb.auth.signInWithPassword({ email: document.getElementById('loginEmail').value, password: document.getElementById('loginPass').value });
            if (error) { const msg = document.getElementById('loginMsg'); msg.textContent = '❌ ' + error.message; msg.className = 'mt-4 text-center text-sm text-red-600 font-bold'; msg.classList.remove('hidden'); btn.disabled = false; btn.textContent = 'Entrar'; }
            else { window.location.href = 'index.html'; }
        });
    </script>
</body>
</html>
