<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Pincha - Agencia de Empleos</title>
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { pincha: { orange: '#FF6B35', blue: '#1E3A5F' } },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        /* Estilos explícitos para evitar limitaciones de Tailwind CDN con clases dinámicas */
        .tab-btn { transition: all 0.2s ease; cursor: pointer; }
        .tab-btn.active { background-color: white; color: #FF6B35; box-shadow: 0 2px 5px rgba(0,0,0,0.1); transform: scale(1.02); }
        .tab-btn.inactive { background-color: transparent; color: #6B7280; box-shadow: none; }
        .tab-btn:hover:not(.active) { color: #374151; }
        
        .form-section { display: none; }
        .form-section.show { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .btn-tactile:active { transform: scale(0.97); }
        .btn-tactile { transition: all 0.15s ease; }
        
        .search-dropdown { display: none; }
        .search-dropdown.show { display: block; animation: slideDown 0.2s ease; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800 antialiased">

    <!-- 🔒 AUTH GATE (Punto de entrada obligatorio) -->
    <div id="authGate" class="fixed inset-0 bg-gradient-to-br from-pincha-blue to-gray-900 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8">
            <div class="text-center mb-6">
                <div class="flex justify-center gap-1 mb-2">
                    <span class="text-4xl font-black text-pincha-blue">M</span>
                    <span class="text-4xl font-black text-pincha-orange">P</span>
                </div>
                <h2 class="text-2xl font-bold text-pincha-blue">Bienvenido a Mi Pincha</h2>
                <p class="text-gray-500 text-sm">Conectamos talento con oportunidades en La Habana</p>
            </div>
            
            <!-- Tabs -->
            <div class="flex gap-2 mb-6 bg-gray-100 p-1 rounded-lg">
                <button id="tabLogin" class="tab-btn active flex-1 py-2 rounded-md font-bold">Iniciar sesión</button>
                <button id="tabRegister" class="tab-btn inactive flex-1 py-2 rounded-md font-bold">Crear cuenta</button>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="form-section show space-y-4">
                <input type="email" id="loginEmail" placeholder="Correo electrónico" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-pincha-orange outline-none btn-tactile">
                <input type="password" id="loginPass" placeholder="Contraseña" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-pincha-orange outline-none btn-tactile">
                <div class="flex items-center gap-2">
                    <input type="checkbox" id="keepSession" checked class="w-4 h-4 accent-pincha-orange">
                    <label for="keepSession" class="text-sm text-gray-600">Mantener sesión iniciada</label>
                </div>
                <button type="submit" class="auth-btn w-full bg-pincha-orange text-white font-bold py-3 rounded-lg hover:bg-orange-600 btn-tactile shadow-md">Entrar</button>
            </form>

            <!-- Register Form -->
            <form id="registerForm" class="form-section space-y-4">
                <select id="regType" class="w-full px-4 py-3 border border-gray-300 rounded-lg bg-white focus:ring-2 focus:ring-pincha-orange outline-none btn-tactile">
                    <option value="candidate">👤 Soy Candidato</option>
                    <option value="company">🏢 Soy Empresa</option>
                </select>
                <input type="text" id="regName" placeholder="Nombre completo / Razón social" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-pincha-orange outline-none btn-tactile">
                <input type="email" id="regEmail" placeholder="Correo electrónico" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-pincha-orange outline-none btn-tactile">
                <input type="password" id="regPass" placeholder="Contraseña (mín. 6 caracteres)" required minlength="6" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-pincha-orange outline-none btn-tactile">
                <button type="submit" class="auth-btn w-full bg-pincha-blue text-white font-bold py-3 rounded-lg hover:bg-blue-800 btn-tactile shadow-md">Registrarme</button>
            </form>
            <div id="authMsg" class="mt-4 text-center text-sm hidden font-bold"></div>
        </div>
    </div>

    <!-- 🌐 MAIN APP (Bloqueado hasta auth) -->
    <div id="mainApp" class="min-h-screen flex flex-col blur-sm pointer-events-none transition-all duration-300">
        
        <!-- HEADER -->
        <header class="bg-white shadow-sm sticky top-0 z-40">
            <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
                <div class="flex items-center gap-2 cursor-pointer btn-tactile" onclick="window.location.reload()">
                    <span class="text-2xl font-black text-pincha-blue">M</span>
                    <span class="text-2xl font-black text-pincha-orange">P</span>
                </div>
                <div class="flex items-center gap-4">
                    <span id="userBadge" class="text-sm font-medium text-gray-600 bg-gray-100 px-3 py-1 rounded-full">Cargando...</span>
                    <button id="logoutBtn" class="text-sm text-red-500 hover:text-red-700 font-medium btn-tactile">Cerrar sesión</button>
                </div>
            </div>
        </header>

        <!-- CONTENT -->
        <main class="flex-grow max-w-7xl mx-auto px-4 py-8 w-full">
            
            <!-- SEARCH BAR -->
            <div class="relative mb-6">
                <div class="bg-white rounded-xl shadow-lg border border-gray-200 p-2 flex flex-col md:flex-row gap-2">
                    <div class="relative flex-grow">
                        <input type="text" id="searchInput" placeholder="Buscar puesto, categoría o empresa..." 
                               class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-pincha-orange outline-none btn-tactile">
                        <div id="searchDropdown" class="search-dropdown absolute top-full left-0 right-0 mt-2 bg-white border border-gray-200 rounded-lg shadow-xl max-h-60 overflow-y-auto z-50"></div>
                    </div>
                    <select id="locationFilter" class="md:w-48 px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-pincha-orange outline-none btn-tactile">
                        <option value="">📍 Todas las ubicaciones</option>
                        <option value="Playa">Playa</option>
                        <option value="Vedado">Vedado</option>
                        <option value="Centro Habana">Centro Habana</option>
                        <option value="Habana Vieja">Habana Vieja</option>
                        <option value="Plaza de la Revolución">Plaza de la Revolución</option>
                    </select>
                    <button id="searchBtn" class="bg-pincha-orange text-white font-bold px-6 py-3 rounded-lg hover:bg-orange-600 btn-tactile shadow-md">
                        🔍 Buscar
                    </button>
                </div>
            </div>

            <!-- FILTER TAGS -->
            <div class="flex flex-wrap gap-2 mb-6" id="filterTags">
                <span class="filter-tag px-3 py-1 bg-gray-200 text-gray-700 rounded-full text-sm cursor-pointer hover:bg-pincha-orange hover:text-white btn-tactile" data-cat="Tecnología e Informática">Tecnología</span>
                <span class="filter-tag px-3 py-1 bg-gray-200 text-gray-700 rounded-full text-sm cursor-pointer hover:bg-pincha-orange hover:text-white btn-tactile" data-cat="Salud y Medicina">Salud</span>
                <span class="filter-tag px-3 py-1 bg-gray-200 text-gray-700 rounded-full text-sm cursor-pointer hover:bg-pincha-orange hover:text-white btn-tactile" data-cat="Educación y Formación">Educación</span>
                <span class="filter-tag px-3 py-1 bg-gray-200 text-gray-700 rounded-full text-sm cursor-pointer hover:bg-pincha-orange hover:text-white btn-tactile" data-cat="Construcción y Oficios">Construcción</span>
                <span class="filter-tag px-3 py-1 bg-gray-200 text-gray-700 rounded-full text-sm cursor-pointer hover:bg-pincha-orange hover:text-white btn-tactile" data-cat="Ventas y Comercial">Ventas</span>
                <span class="filter-tag px-3 py-1 bg-gray-200 text-gray-700 rounded-full text-sm cursor-pointer hover:bg-pincha-orange hover:text-white btn-tactile" data-cat="Servicios Domésticos">Servicios</span>
            </div>

            <!-- JOBS GRID -->
            <div id="jobsGrid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-4">
                <div class="bg-white p-5 rounded-xl border border-gray-200 animate-pulse h-32"></div>
                <div class="bg-white p-5 rounded-xl border border-gray-200 animate-pulse h-32"></div>
                <div class="bg-white p-5 rounded-xl border border-gray-200 animate-pulse h-32"></div>
            </div>
        </main>

        <!-- FOOTER -->
        <footer class="bg-pincha-blue text-white py-6 text-center text-sm mt-8">
            <p>© 2024 Mi Pincha. Conectamos talento con oportunidades.</p>
        </footer>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
