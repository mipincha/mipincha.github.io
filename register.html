<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba de Registro - Mi Pincha</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-xl shadow-lg max-w-md w-full text-center">
        <h2 class="text-2xl font-bold mb-4">Prueba de Diagnóstico</h2>
        <p class="text-gray-600 mb-6">Si este botón funciona, el problema era el código anterior. Si no hace nada, tu navegador está bloqueando o cacheando el archivo.</p>
        
        <div id="debugBox" class="hidden mb-4 p-3 bg-yellow-100 text-yellow-800 text-sm rounded border border-yellow-300 font-mono"></div>

        <form id="testForm">
            <input type="email" id="testEmail" placeholder="correo@ejemplo.com" required class="w-full px-4 py-2 border rounded mb-4">
            <button type="submit" id="testBtn" class="w-full bg-blue-600 text-white font-bold py-3 rounded hover:bg-blue-700">
                HAZ CLIC AQUÍ PARA PROBAR
            </button>
        </form>
    </div>

    <script>
        console.log("✅ El script se ha cargado correctamente.");
        
        document.getElementById('testForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Evita que la página se recargue
            
            const debugBox = document.getElementById('debugBox');
            debugBox.textContent = "🟢 ¡ÉXITO! El evento de clic fue detectado. El JavaScript está funcionando.";
            debugBox.classList.remove('hidden');
            
            alert("¡El botón funciona! El problema no es tu navegador, era el código anterior.");
            
            console.log("✅ Evento submit ejecutado con éxito.");
        });
    </script>
</body>
</html>
