<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Mi Pincha</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { pincha: { orange: '#FF6B35', blue: '#1E3A5F' } }, fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] } } } }
    </script>
    <style>
        .tab-btn { transition: all 0.2s ease; cursor: pointer; }
        .tab-btn.active { background-color: white; color: #FF6B35; box-shadow: 0 2px 5px rgba(0,0,0,0.1); transform: scale(1.02); }
        .tab-btn.inactive { background-color: transparent; color: #6B7280; box-shadow: none; }
        .tab-btn:hover:not(.active) { color: #374151; }
        .form-section { display: none; }
        .form-section.show { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .btn-tactile:active { transform: scale(0.97); }
        .btn-tactile { transition: all 0.15s ease; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

    <header class="bg-white shadow-sm py-4">
        <div class="container mx-auto px-6 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2">
                <img src="images/logo.png" alt="Mi Pincha" class="h-8 w-auto" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
                <div class="hidden items-center gap-1">
                    <span class="text-2xl font-bold text-pincha-blue">M</span>
                    <span class="text-2xl font-bold text-pincha-orange">P</span>
                </div>
            </a>
            <a href="index.html" class="text-sm text-pincha-blue hover:text-pincha-orange font-medium">Volver al inicio</a>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center py-10 px-4">
        <div class="w-full max-w-lg bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">
            <div class="bg-pincha-blue p-6 text-center">
                <h2 class="text-2xl font-bold text-white">Crear cuenta</h2>
                <p class="text-blue-200 text-sm mt-1">Únete a la comunidad laboral más grande</p>
            </div>

            <div class="p-6">
                <!-- TOGGLE FUNCIONAL -->
                <div class="flex gap-2 mb-6 bg-gray-100 p-1 rounded-lg">
                    <button type="button" id="tabCandidate" class="tab-btn active flex-1 py-2 rounded-md font-bold">👤 Candidato</button>
                    <button type="button" id="tabCompany" class="tab-btn inactive flex-1 py-2 rounded-md font-bold">🏢 Empresa</button>
                </div>

                <form id="regForm" class="space-y-4">
                    <input type="hidden" id="userType" value="candidate">

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Nombre completo / Razón social</label>
                        <input type="text" id="regName" required class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-pincha-orange outline-none btn-tactile">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Correo electrónico</label>
                        <input type="email" id="regEmail" required class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-pincha-orange outline-none btn-tactile">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña (mín. 6 caracteres)</label>
                        <input type="password" id="regPass" required minlength="6" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-pincha-orange outline-none btn-tactile">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Municipio</label>
                        <select id="regLocation" required class="w-full px-4 py-2.5 border border-gray-300 rounded-lg bg-white focus:ring-2 focus:ring-pincha-orange outline-none btn-tactile">
                            <option value="">Seleccionar municipio</option>
                            <option value="Playa">Playa</option>
                            <option value="Plaza de la Revolución">Plaza de la Revolución</option>
                            <option value="Centro Habana">Centro Habana</option>
                            <option value="Habana Vieja">Habana Vieja</option>
                            <option value="Regla">Regla</option>
                            <option value="Habana del Este">Habana del Este</option>
                            <option value="Guanabacoa">Guanabacoa</option>
                            <option value="San Miguel del Padrón">San Miguel del Padrón</option>
                            <option value="10 de Octubre">10 de Octubre</option>
                            <option value="Cerro">Cerro</option>
                            <option value="Marianao">Marianao</option>
                            <option value="La Lisa">La Lisa</option>
                            <option value="Arroyo Naranjo">Arroyo Naranjo</option>
                            <option value="Boyeros">Boyeros</option>
                            <option value="Cotorro">Cotorro</option>
                        </select>
                    </div>

                    <!-- CAMPOS CANDIDATO -->
                    <div id="candidateFields" class="form-section show space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Categoría profesional</label>
                            <select id="regCategory" required class="w-full px-4 py-2.5 border border-gray-300 rounded-lg bg-white focus:ring-2 focus:ring-pincha-orange outline-none btn-tactile">
                                <option value="">Seleccionar categoría</option>
                                <option value="Tecnología e Informática">Tecnología e Informática</option>
                                <option value="Salud y Medicina">Salud y Medicina</option>
                                <option value="Educación y Formación">Educación y Formación</option>
                                <option value="Administración y Oficina">Administración y Oficina</option>
                                <option value="Finanzas y Contabilidad">Finanzas y Contabilidad</option>
                                <option value="Legal y Jurídico">Legal y Jurídico</option>
                                <option value="Ingeniería y Arquitectura">Ingeniería y Arquitectura</option>
                                <option value="Construcción y Oficios">Construcción y Oficios</option>
                                <option value="Transporte y Logística">Transporte y Logística</option>
                                <option value="Ventas y Comercial">Ventas y Comercial</option>
                                <option value="Marketing y Publicidad">Marketing y Publicidad</option>
                                <option value="Arte, Cultura y Entretenimiento">Arte, Cultura y Entretenimiento</option>
                                <option value="Hostelería y Turismo">Hostelería y Turismo</option>
                                <option value="Limpieza y Mantenimiento">Limpieza y Mantenimiento</option>
                                <option value="Manufactura y Producción">Manufactura y Producción</option>
                                <option value="Agricultura, Ganadería y Pesca">Agricultura, Ganadería y Pesca</option>
                                <option value="Seguridad y Defensa">Seguridad y Defensa</option>
                                <option value="Recursos Humanos">Recursos Humanos</option>
                                <option value="Ciencia e Investigación">Ciencia e Investigación</option>
                                <option value="Medios y Comunicación">Medios y Comunicación</option>
                                <option value="Deportes y Fitness">Deportes y Fitness</option>
                                <option value="Servicios Domésticos">Servicios Domésticos</option>
                                <option value="Freelance y Economía Digital">Freelance y Economía Digital</option>
                                <option value="Energía y Medio Ambiente">Energía y Medio Ambiente</option>
                                <option value="Blockchain, Cripto y Web3">Blockchain, Cripto y Web3</option>
                                <option value="Inteligencia Artificial y Automatización">Inteligencia Artificial y Automatización</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Puesto deseado</label>
                            <input type="text" id="regPosition" placeholder="Ej: Desarrollador Frontend" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-pincha-orange outline-none btn-tactile">
                        </div>
                    </div>

                    <!-- CAMPOS EMPRESA -->
                    <div id="companyFields" class="form-section space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Industria / Sector</label>
                            <input type="text" id="regIndustry" placeholder="Ej: Tecnología, Turismo, Alimentos" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-pincha-orange outline-none btn-tactile">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Sitio web (opcional)</label>
                            <input type="url" id="regWebsite" placeholder="https://tuempresa.com" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-pincha-orange outline-none btn-tactile">
                        </div>
                    </div>

                    <button type="submit" id="btnSubmit" class="w-full bg-pincha-orange text-white font-bold py-3 rounded-lg hover:bg-orange-600 btn-tactile shadow-md mt-4">
                        Registrarme
                    </button>
                </form>

                <div id="regMsg" class="mt-4 text-center text-sm hidden font-bold"></div>
                <p class="text-center text-sm text-gray-500 mt-6">¿Ya tienes cuenta? <a href="login.html" class="text-pincha-orange font-bold hover:underline">Inicia sesión</a></p>
            </div>
        </div>
    </main>

    <script src="js/app.js"></script>
    <script>
        // Lógica exclusiva de Register (Toggle + Envío)
        document.addEventListener('DOMContentLoaded', () => {
            const btnC = document.getElementById('tabCandidate');
            const btnE = document.getElementById('tabCompany');
            const formC = document.getElementById('candidateFields');
            const formE = document.getElementById('companyFields');
            const typeInput = document.getElementById('userType');

            function setActive(isCandidate) {
                typeInput.value = isCandidate ? 'candidate' : 'company';
                if(isCandidate) {
                    btnC.classList.add('active'); btnC.classList.remove('inactive');
                    btnE.classList.add('inactive'); btnE.classList.remove('active');
                    formC.classList.add('show'); formE.classList.remove('show');
                } else {
                    btnE.classList.add('active'); btnE.classList.remove('inactive');
                    btnC.classList.add('inactive'); btnC.classList.remove('active');
                    formE.classList.add('show'); formC.classList.remove('show');
                }
            }

            btnC.addEventListener('click', () => setActive(true));
            btnE.addEventListener('click', () => setActive(false));

            // Submit
            document.getElementById('regForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const btn = document.getElementById('btnSubmit');
                const msg = document.getElementById('regMsg');
                btn.disabled = true; btn.textContent = 'Registrando...';
                msg.classList.add('hidden');

                try {
                    const { error } = await supabase.auth.signUp({
                        email: document.getElementById('regEmail').value,
                        password: document.getElementById('regPass').value,
                        options: { data: { full_name: document.getElementById('regName').value, user_type: typeInput.value } }
                    });
                    if(error) throw error;

                    const userId = (await supabase.auth.getUser()).data.user.id;
                    const type = typeInput.value;
                    
                    if(type === 'candidate') {
                        await supabase.from('candidates').insert({
                            profile_id: userId,
                            category: document.getElementById('regCategory').value,
                            desired_position: document.getElementById('regPosition').value,
                            is_active: true
                        });
                    } else {
                        await supabase.from('companies').insert({
                            profile_id: userId,
                            industry: document.getElementById('regIndustry').value,
                            website: document.getElementById('regWebsite').value,
                            is_verified: false
                        });
                    }

                    await supabase.from('profiles').update({ location: document.getElementById('regLocation').value }).eq('id', userId);

                    msg.className = 'mt-4 text-center text-sm text-green-600 font-bold';
                    msg.textContent = '✅ Registro exitoso. Verifica tu correo.';
                    msg.classList.remove('hidden');
                    setTimeout(() => window.location.href = 'index.html', 2000);
                } catch(err) {
                    msg.className = 'mt-4 text-center text-sm text-red-600 font-bold';
                    msg.textContent = ' ' + err.message;
                    msg.classList.remove('hidden');
                } finally {
                    btn.disabled = false; btn.textContent = 'Registrarme';
                }
            });
        });
    </script>
</body>
</html>
