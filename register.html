<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Mi Pincha</title>
    <!-- Tailwind CSS (CDN para desarrollo rápido sin Node.js) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        pincha: {
                            orange: '#FF6B35',
                            blue: '#1E3A5F',
                            light: '#F3F4F6'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #FF6B35; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

    <!-- HEADER -->
    <header class="bg-white shadow-sm py-4">
        <div class="container mx-auto px-6 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2">
                <span class="text-3xl font-bold text-pincha-blue">M</span>
                <span class="text-3xl font-bold text-pincha-orange">P</span>
                <span class="text-xs font-semibold text-gray-500 ml-2 hidden sm:block">Agencia de Empleos</span>
            </a>
            <a href="index.html" class="text-sm text-pincha-blue hover:text-pincha-orange font-medium">Volver al inicio</a>
        </div>
    </header>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="flex-grow flex items-center justify-center py-12 px-4">
        <div class="w-full max-w-md bg-white rounded-2xl shadow-lg overflow-hidden border border-gray-100">
            
            <!-- Header del Formulario -->
            <div class="bg-pincha-blue p-6 text-center">
                <h2 class="text-2xl font-bold text-white">Crear cuenta</h2>
                <p class="text-blue-200 text-sm mt-1">Únete a la comunidad laboral más grande</p>
            </div>

            <!-- Formulario -->
            <form id="regForm" class="p-6 space-y-5">
                
                <!-- Toggle Candidato / Empresa -->
                <div class="grid grid-cols-2 gap-2 bg-gray-100 p-1 rounded-lg mb-6">
                    <button type="button" id="btnCandidato" onclick="setUserType('candidate')" class="py-2 px-3 rounded-md text-sm font-bold transition shadow-sm bg-white text-pincha-orange">
                        👤 Candidato
                    </button>
                    <button type="button" id="btnEmpresa" onclick="setUserType('company')" class="py-2 px-3 rounded-md text-sm font-bold transition text-gray-500 hover:text-gray-700">
                        🏢 Empresa
                    </button>
                </div>

                <input type="hidden" id="userType" value="candidate">

                <!-- Campos Comunes -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nombre completo</label>
                    <input type="text" id="nombre" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-pincha-orange focus:border-transparent outline-none transition">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Correo electrónico</label>
                    <input type="email" id="email" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-pincha-orange focus:border-transparent outline-none transition">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña (mín. 6 caracteres)</label>
                    <input type="password" id="password" required minlength="6" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-pincha-orange focus:border-transparent outline-none transition">
                </div>

                <!-- Campos Específicos -->
                <div id="camposCandidato">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Categoría principal</label>
                    <select id="categoria" class="w-full px-4 py-2 border border-gray-300 rounded-lg bg-white focus:ring-2 focus:ring-pincha-orange outline-none">
                        <option value="Tecnología">Tecnología e Informática</option>
                        <option value="Salud">Salud y Medicina</option>
                        <option value="Educación">Educación y Formación</option>
                        <option value="Construcción">Construcción y Oficios</option>
                        <option value="Ventas">Ventas y Comercial</option>
                        <option value="Servicios">Servicios Domésticos</option>
                    </select>
                </div>

                <div id="camposEmpresa" class="hidden">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nombre de la Empresa</label>
                    <input type="text" id="nombreEmpresa" placeholder="Ej: TechSolutions Cuba" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-pincha-orange outline-none">
                </div>

                <!-- Botón de Acción -->
                <button type="submit" id="btnSubmit" class="w-full bg-pincha-orange text-white font-bold py-3 rounded-lg hover:bg-orange-600 transition flex justify-center items-center gap-2">
                    <span id="btnText">Registrarme</span>
                    <div id="spinner" class="loader hidden"></div>
                </button>

                <!-- Mensajes -->
                <div id="msgBox" class="hidden text-center p-3 rounded-lg text-sm"></div>
            </form>
        </div>
    </main>

    <!-- SCRIPTS -->
    <script>
        // 1. Configuración Supabase (Tus Credenciales)
        const SUPABASE_URL = 'https://yznkrbhfsrcoskyoyfxs.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl6bmtyYmhmc3Jjb3NreW95ZnhzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2NjczNzQsImV4cCI6MjA5NTI0MzM3NH0.TF_iauRfdaICpT7KipXwrphQYyGu4X4v2_FzQOIl1qw';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 2. Lógica de Interfaz (Toggle)
        function setUserType(type) {
            document.getElementById('userType').value = type;
            const btnC = document.getElementById('btnCandidato');
            const btnE = document.getElementById('btnEmpresa');
            const camposC = document.getElementById('camposCandidato');
            const camposE = document.getElementById('camposEmpresa');

            if (type === 'candidate') {
                btnC.className = "py-2 px-3 rounded-md text-sm font-bold transition shadow-sm bg-white text-pincha-orange";
                btnE.className = "py-2 px-3 rounded-md text-sm font-bold transition text-gray-500 hover:text-gray-700";
                camposC.classList.remove('hidden');
                camposE.classList.add('hidden');
            } else {
                btnE.className = "py-2 px-3 rounded-md text-sm font-bold transition shadow-sm bg-white text-pincha-orange";
                btnC.className = "py-2 px-3 rounded-md text-sm font-bold transition text-gray-500 hover:text-gray-700";
                camposE.classList.remove('hidden');
                camposC.classList.add('hidden');
            }
        }

        // 3. Lógica de Registro con Email Verification
        document.getElementById('regForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('btnSubmit');
            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('spinner');
            const msgBox = document.getElementById('msgBox');
            const tipo = document.getElementById('userType').value;
            const email = document.getElementById('email').value;

            // UI Loading
            btn.disabled = true;
            btn.classList.add('opacity-75', 'cursor-not-allowed');
            btnText.textContent = "Registrando...";
            spinner.classList.remove('hidden');
            msgBox.classList.add('hidden');

            try {
                // A. Registro en Supabase Auth (Envía email de confirmación automáticamente)
                const { data, error } = await supabase.auth.signUp({
                    email: email,
                    password: document.getElementById('password').value,
                    options: {
                        data: {
                            full_name: document.getElementById('nombre').value,
                            user_type: tipo // Guardamos si es candidato o empresa
                        }
                    }
                });

                if (error) throw error;

                // B. Si sale bien (data.user existe)
                if (data.user) {
                    // Guardamos el email en localstorage para la página de verificación
                    localStorage.setItem('verify_email', email);
                    
                    // UI Success
                    msgBox.className = "block text-center p-3 rounded-lg text-sm bg-green-100 text-green-800";
                    msgBox.innerHTML = `
                        <p class="font-bold">✅ ¡Casi listo!</p>
                        <p>Hemos enviado un correo de confirmación a <strong>${email}</strong>.</p>
                        <p class="mt-2 text-xs text-gray-500">Revisa tu bandeja de entrada (o Spam) y haz clic en el enlace.</p>
                    `;
                    msgBox.classList.remove('hidden');
                    
                    // Limpiar formulario
                    document.getElementById('regForm').reset();
                    document.getElementById('userType').value = 'candidate';
                    setUserType('candidate'); // Reset visual
                } else {
                    throw new Error("No se pudo crear el usuario.");
                }

            } catch (err) {
                // UI Error
                msgBox.className = "block text-center p-3 rounded-lg text-sm bg-red-100 text-red-800";
                msgBox.textContent = "❌ Error: " + err.message;
                msgBox.classList.remove('hidden');
            } finally {
                // Reset Botón
                btn.disabled = false;
                btn.classList.remove('opacity-75', 'cursor-not-allowed');
                btnText.textContent = "Registrarme";
                spinner.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
